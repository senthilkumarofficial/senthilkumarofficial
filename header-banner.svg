<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 260" width="100%" height="260">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="950" height="260" fill="url(#bgGrad)" rx="10" />

  <!-- Triangle Arc Reactor Background -->
  <g transform="translate(475, 100) scale(0.95)">
    
    <!-- Static Structural Elements -->
    <circle r="95" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15" />
    <polygon points="0,80 -69.3,-40 69.3,-40" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3" filter="url(#glow)" />
    <line x1="0" y1="0" x2="0" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.2" />
    <line x1="0" y1="0" x2="-69.3" y2="-40" stroke="#ffffff" stroke-width="2" opacity="0.2" />
    <line x1="0" y1="0" x2="69.3" y2="-40" stroke="#ffffff" stroke-width="2" opacity="0.2" />

    <!-- Pulsing Light Elements (Slow Heartbeat) -->
    <g>
      <animate attributeName="opacity" values="0.1; 0.7; 0.1; 1; 0.1; 0.1" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 1" dur="4s" repeatCount="indefinite" />
      
      <polygon points="0,60 -52,-30 52,-30" fill="none" stroke="#ffffff" stroke-width="8" filter="url(#glow)" />
      <polygon points="0,30 -26,-15 26,-15" fill="#ffffff" filter="url(#glow)" />
      <circle r="8" fill="#ffffff" filter="url(#glow)" />
    </g>
  </g>

  <!-- Text on top (Mathematical Double-Struck Unicode) -->
  <text x="475" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="56" fill="#ffffff" text-anchor="middle" letter-spacing="1">𝕊𝕖𝕟𝕥𝕙𝕚𝕝 𝕂𝕦𝕞𝕒𝕣</text>
  
  <text x="475" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="22" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">DevOps Engineer | Cloud Engineer | Full Stack Developer</text>
</svg>
